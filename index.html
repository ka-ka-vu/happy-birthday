<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    overflow:hidden;
    height:100vh;
    background:linear-gradient(135deg,#fff4f8,#ffe7f1,#fff0f6);
}

/* tim bay */
.hearts{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
}

.heart{
    position:absolute;
    color:#ff7ab8;
    animation:fall linear forwards;
}

@keyframes fall{
    from{transform:translateY(-100px);opacity:1;}
    to{transform:translateY(110vh);opacity:0;}
}

/* icon bay thêm */
.floatIcons{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
}

.ficon{
    position:absolute;
    animation:fall linear forwards;
}

/* khung giữa */
.box{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:460px;
    background:rgba(255,255,255,.78);
    border-radius:28px;
    padding:35px;
    text-align:center;
    box-shadow:0 0 30px rgba(255,120,180,.25);
}

h2{
    color:#ff4fa0;
    margin-bottom:18px;
    font-size:32px;
}

#clock{
    font-size:60px;
    font-weight:bold;
    color:#ff1493;
}

/* thiệp cute */
.card{
    width:360px;
    margin:auto;
    background:linear-gradient(135deg,#fffafd,#ffeef7);
    padding:24px;
    border-radius:25px;
    border:3px solid #ffd3e8;
    box-shadow:0 10px 25px rgba(255,120,180,.22);
    position:relative;
    animation:pop .8s ease;
}

@keyframes pop{
    from{transform:scale(0);}
    to{transform:scale(1);}
}

.ribbon{
    position:absolute;
    top:-18px;
    right:18px;
    font-size:34px;
}

.card h1{
    color:#ff4fa0;
    font-size:30px;
    margin-bottom:14px;
    text-shadow:0 0 10px pink;
}

#msg{
    color:#d65c95;
    line-height:1.8;
    font-size:18px;
    min-height:130px;
    text-align:center;
}

.icons{
    font-size:28px;
    margin-top:10px;
    animation:blink 1.5s infinite;
}

@keyframes blink{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.12);}
}

/* khu ảnh */
#gallery{
    display:none;
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    overflow:hidden;
}

/* ảnh chạy */
.photo{
    position:absolute;
    width:150px;   /* trước là 110px */
    height:210px;  /* trước là 150px */
    object-fit:cover;
    border-radius:14px;
    box-shadow:0 8px 18px rgba(0,0,0,.18);
    left:-180px;
    animation:slideAcross linear infinite;
}

@keyframes slideAcross{
    0%{
        transform:translateX(0);
        opacity:0;
    }
    10%{
        opacity:1;
    }
    100%{
        transform:translateX(calc(100vw + 260px));
        opacity:1;
    }
}
</style>
</head>
<body>

<div class="hearts" id="hearts"></div>
<div class="floatIcons" id="floatIcons"></div>

<div class="box" id="box">
    <h2>Happy Birthday</h2>
    <div id="clock">00:00:00</div>
</div>

<div id="gallery"></div>

<script>

/* tim bay */
function makeHeart(){
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(18+Math.random()*22)+"px";
    h.style.animationDuration=(4+Math.random()*4)+"s";
    document.getElementById("hearts").appendChild(h);
    setTimeout(()=>h.remove(),8000);
}
setInterval(makeHeart,250);

/* icon tình yêu + bánh sinh nhật */
function makeIcon(){
    let arr=["💖","💕","💘","💝","🎂","🧁","🍰","💗","💕"];
    let x=document.createElement("div");
    x.className="ficon";
    x.innerHTML=arr[Math.floor(Math.random()*arr.length)];
    x.style.left=Math.random()*100+"vw";
    x.style.fontSize=(20+Math.random()*26)+"px";
    x.style.animationDuration=(5+Math.random()*5)+"s";
    document.getElementById("floatIcons").appendChild(x);
    setTimeout(()=>x.remove(),9000);
}
setInterval(makeIcon,500);

/* giờ VN */
function vietnamNow(){
    return new Date(
        new Date().toLocaleString("en-US",{timeZone:"Asia/Ho_Chi_Minh"})
    );
}

/* chỉnh thời gian */
const target = new Date("2026-04-19T00:00:00");

let done=false;

/* thiệp cute */
function showCard(){

document.getElementById("box").innerHTML=`
<div class="card">
    <div class="ribbon">🎀</div>
    <h1>Happy Birthday Em!</h1>
    <div id="msg"></div>
    <div class="icons">🧸 🎂 💖 💕 🌸 🎁</div>
</div>
`;

let text=`Chúc em sinh nhật thật vui vẻ ✨
Luôn xinh đẹp, đáng yêu
và hạnh phúc mỗi ngày.
Mong mọi điều tốt đẹp nhất
sẽ đến với em!
Cảm ơn em vì đã yêu anh 💕`;

let i=0;

let run=setInterval(()=>{
document.getElementById("msg").innerHTML=
text.substring(0,i).replace(/\n/g,"<br>");
i++;

if(i>text.length){
clearInterval(run);

setTimeout(()=>{
document.getElementById("box").style.display="none";
startGallery();
},7000);

}

},45);
}

/* ảnh chạy */
function startGallery(){

let imgs=[
"1.jpg","2.jpg","3.jpg","4.jpg","5.jpg","6.jpg",
"7.jpg","8.jpg","9.jpg","10.jpg","11.jpg","12.jpg",
"13.jpg","14.jpg","15.jpg","16.jpg","17.jpg","18.jpg",
"19.jpg","20.jpg","21.jpg","22.jpg"
];

let gallery=document.getElementById("gallery");
gallery.innerHTML="";
gallery.style.display="block";

for(let i=0;i<14;i++){

let img=document.createElement("img");
img.src=imgs[i % imgs.length];
img.className="photo";

img.style.top=(Math.random()*78)+"%";
img.style.animationDelay=(i*1.4)+"s";
img.style.animationDuration=(12+Math.random()*6)+"s";

gallery.appendChild(img);
}
}

/* đồng hồ */
function updateClock(){

let now=vietnamNow();
let diff=target-now;

if(diff<=0 && !done){
done=true;
showCard();
return;
}

let total=Math.floor(diff/1000);

let h=Math.floor(total/3600);
let m=Math.floor((total%3600)/60);
let s=total%60;

document.getElementById("clock").innerHTML=
String(h).padStart(2,"0")+":"+
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0");
}

setInterval(updateClock,1000);
updateClock();

</script>

</body>
</html>
